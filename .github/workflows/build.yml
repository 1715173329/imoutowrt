name: Build 7DR7299 ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake flex git libssl-dev libncurses5-dev unzip zlib1g-dev gettext

      - name: Clone source code
        run: |
          git clone -b master-mediatek-7dr7299 https://github.com/1715173329/imoutowrt imoutowrt
          cd imoutowrt

      - name: Update feeds
        run: |
          cd imoutowrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build firmware
        run: |
          cd imoutowrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-7dr7299
          path: imoutowrt/bin/targets/mediatek/mt7622/
