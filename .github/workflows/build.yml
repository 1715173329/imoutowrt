name: Build 7DR7299 ImmortalWrt

# 只允许手动触发
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # 这里改成 Debian 11 (bullseye)
    runs-on: debian-11
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install compile dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison git gettext libssl-dev unzip curl python3

      - name: Clone 7DR7299 专用源码
        run: |
          git clone -b master-mediatek-7dr7299 https://github.com/1715173329/imoutowrt openwrt

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_PACKAGE_onionshare-cli=n" >> .config

      - name: Download source files
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7DR7299-Firmware
          path: openwrt/bin/targets/mediatek/mt7622
